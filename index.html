<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Weather Channel</title>
    <style>
      :root {
        --blue-1: #0b2678;
        --blue-2: #1b3bb8;
        --panel: #244ecb;
        --panel-dark: #17379b;
        --gold: #c19137;
        --text: #f7f7ff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", Verdana, sans-serif;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(15, 31, 103, 0.92), rgba(8, 18, 70, 0.95)),
          repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 3px),
          radial-gradient(circle at 20% 20%, #2e5ae4 0, #162f93 30%, #0b1b63 65%, #081341 100%);
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .tv {
        width: min(960px, 100%);
        border: 3px solid #d8d8df;
        box-shadow: 0 0 0 4px var(--gold), 0 0 0 8px #041046, 0 16px 28px rgba(0, 0, 0, 0.45);
        background: linear-gradient(180deg, #17379b, #1f46be 45%, #17379b);
      }

      .topbar {
        display: flex;
        gap: 14px;
        align-items: center;
        border-bottom: 3px solid var(--gold);
        padding: 8px 12px;
        background: linear-gradient(90deg, #0b2577, #1f43ba);
      }

      .logo {
        width: 84px;
        height: 70px;
        border: 2px solid #f3f3f8;
        background: linear-gradient(180deg, #1a49cd, #0f2f87);
        display: grid;
        place-items: center;
        text-align: center;
        font-weight: 900;
        line-height: 1;
        font-size: 14px;
      }

      .header-text { flex: 1; }
      .title { font-size: clamp(1rem, 2vw, 1.6rem); font-weight: 700; letter-spacing: 0.04em; }
      .subtitle { opacity: 0.9; font-size: 0.9rem; }
      .clock { text-align: right; font-family: "Courier New", monospace; font-weight: 700; }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px;
        border-bottom: 2px solid var(--gold);
        background: linear-gradient(180deg, #12328f, #1a3da9);
      }

      input, button {
        border: 2px solid #e8e8f2;
        background: #2f58ce;
        color: #fff;
        padding: 8px 10px;
        font-size: 0.95rem;
      }
      input { width: 180px; }
      button { cursor: pointer; font-weight: 700; }
      button:hover { filter: brightness(1.1); }

      .forecast {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        padding: 14px;
      }

      .card {
        border: 2px solid #dcdceb;
        box-shadow: inset 0 0 0 2px rgba(17, 39, 122, 0.85);
        background: linear-gradient(180deg, #5f81f0 0%, #345acb 40%, #263ca6 100%);
        text-align: center;
        padding: 8px;
      }
      .day { font-size: 1.2rem; font-weight: 700; }
      .icon { font-size: 2.2rem; margin: 4px 0; }
      .desc { min-height: 2.5em; font-size: 0.95rem; }
      .temps { display: flex; justify-content: space-around; font-size: 1.05rem; font-weight: 700; }

      .status {
        border-top: 2px solid var(--gold);
        padding: 10px 12px;
        background: #102879;
        font-family: "Courier New", monospace;
        min-height: 42px;
      }

      .blink { animation: blink 1.2s step-start infinite; }
      @keyframes blink { 50% { opacity: 0.4; } }
    </style>
  </head>
  <body>
    <main class="tv" aria-live="polite">
      <header class="topbar">
        <div class="logo">THE<br />WEATHER<br />CHANNEL</div>
        <div class="header-text">
          <div class="title" id="locationTitle">U.S. Local Weather</div>
          <div class="subtitle">Current Conditions + 5-Day Forecast</div>
        </div>
        <div class="clock" id="clock">--:--:--</div>
      </header>

      <section class="controls">
        <input id="zip" inputmode="numeric" maxlength="5" placeholder="Enter ZIP code" />
        <button id="fetchBtn">Get Forecast</button>
        <button id="musicBtn">Play MIDI Music</button>
      </section>

      <section class="forecast" id="forecast"></section>
      <footer class="status" id="status">ENTER A U.S. ZIP CODE TO BEGIN<span class="blink">_</span></footer>
    </main>

    <script>
      const zipEl = document.getElementById("zip");
      const btnEl = document.getElementById("fetchBtn");
      const musicBtn = document.getElementById("musicBtn");
      const forecastEl = document.getElementById("forecast");
      const statusEl = document.getElementById("status");
      const locationTitle = document.getElementById("locationTitle");

      function updateClock() {
        const now = new Date();
        document.getElementById("clock").textContent = now.toLocaleTimeString("en-US", {
          hour12: true,
          weekday: "short",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }
      setInterval(updateClock, 1000);
      updateClock();

      function setStatus(text) { statusEl.textContent = text; }

      async function fetchWeather(zip) {
        setStatus(`LOOKING UP ZIP ${zip}...`);
        forecastEl.innerHTML = "";
        const wRes = await fetch(`/api/weather?zip=${encodeURIComponent(zip)}`);
        if (!wRes.ok) {
          const errorPayload = await wRes.json().catch(() => ({}));
          throw new Error(errorPayload.error || "Unable to reach forecast service.");
        }
        return wRes.json();
      }

      function renderForecast(data) {
        const current = data.current;
        const currentText = current.condition?.text || "Unknown";
        const place = data.location;
        locationTitle.textContent = `${place.name}, ${place.region} Weather`;
        setStatus(
          `NOW ${Math.round(current.temp_f)}°F (${currentText}) | FEELS ${Math.round(current.feelslike_f)}°F | WIND ${Math.round(current.wind_mph)} MPH | BAROMETRIC PRESSURE ${current.pressure_mb.toFixed(0)} hPa`
        );

        const days = data.forecast.forecastday;
        const html = days.slice(1, 6).map((item) => {
          const desc = item.day.condition?.text || "Unknown";
          const iconUrl = item.day.condition?.icon ? `https:${item.day.condition.icon}` : "";
          const hi = Math.round(item.day.maxtemp_f);
          const lo = Math.round(item.day.mintemp_f);
          const day = new Date(item.date).toLocaleDateString("en-US", { weekday: "short" }).toUpperCase();

          return `
            <article class="card">
              <div class="day">${day}</div>
              <div class="icon" aria-hidden="true">${iconUrl ? `<img src="${iconUrl}" alt="" width="48" height="48" />` : "❔"}</div>
              <div class="desc">${desc}</div>
              <div class="temps"><span>LO ${lo}</span><span>HI ${hi}</span></div>
            </article>
          `;
        }).join("");

        forecastEl.innerHTML = html;
      }

      btnEl.addEventListener("click", async () => {
        const zip = zipEl.value.trim();
        if (!/^\d{5}$/.test(zip)) {
          setStatus("PLEASE ENTER A VALID 5-DIGIT U.S. ZIP CODE");
          return;
        }

        try {
          const data = await fetchWeather(zip);
          renderForecast(data);
        } catch (err) {
          setStatus(`ERROR: ${err.message}`);
        }
      });

      zipEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter") btnEl.click();
      });

      let midiAudio;
      function startAmbient() {
        if (!midiAudio) {
          midiAudio = new Audio("https://onlinesequencer.net/4778297.mid");
          midiAudio.loop = true;
          midiAudio.volume = 0.3;
        }
        midiAudio.play().catch(() => {
          setStatus("MIDI playback failed. Your browser may not support .mid audio streaming.");
        });
        musicBtn.textContent = "Pause MIDI Music";
      }

      function pauseAmbient() {
        if (midiAudio) midiAudio.pause();
        musicBtn.textContent = "Play MIDI Music";
      }

      musicBtn.addEventListener("click", async () => {
        if (!midiAudio || midiAudio.paused) startAmbient();
        else pauseAmbient();
      });
    </script>
  </body>
</html>
