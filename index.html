<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operation: Trauma Shift</title>
    <style>
      :root {
        --bg: #0e1320;
        --panel: #1a2236;
        --panel-2: #222d48;
        --ok: #56d364;
        --warn: #f2cc60;
        --danger: #f85149;
        --text: #e9edf8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 20% 20%, #1d2842, var(--bg));
        color: var(--text);
        font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        display: grid;
        place-items: center;
        padding: 18px;
      }
      .game {
        width: min(980px, 100%);
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 16px;
      }
      .panel {
        background: linear-gradient(180deg, var(--panel), var(--panel-2));
        border: 1px solid #3a4a70;
        border-radius: 14px;
        box-shadow: 0 12px 35px rgba(0,0,0,.35);
      }
      .hud { padding: 14px; }
      h1 { margin: 0 0 10px; font-size: 1.2rem; }
      .meter {
        background: #121a2a;
        border: 1px solid #3c4a6f;
        border-radius: 999px;
        height: 16px;
        overflow: hidden;
      }
      .bar { height: 100%; width: 100%; background: linear-gradient(90deg, var(--ok), var(--warn), var(--danger)); transition: width .18s linear; }
      .row { margin: 10px 0; }
      .label { font-size: .88rem; opacity: .9; margin-bottom: 5px; }
      ul { margin: 8px 0; padding-left: 18px; }
      li { margin: 4px 0; }
      .status {
        margin-top: 12px;
        min-height: 78px;
        background: #11192a;
        border: 1px solid #33466f;
        border-radius: 10px;
        padding: 10px;
        font-size: .92rem;
      }
      button {
        width: 100%;
        margin-top: 12px;
        background: #3258d3;
        color: #fff;
        border: 0;
        border-radius: 10px;
        padding: 10px;
        font-weight: 700;
        cursor: pointer;
      }
      canvas {
        width: 100%;
        aspect-ratio: 16 / 10;
        display: block;
        background: #070b13;
        border-radius: 14px;
        cursor: crosshair;
      }
      .tip { font-size: .82rem; opacity: .8; margin-top: 8px; }
      @media (max-width: 860px) { .game { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <main class="game">
      <section class="panel hud">
        <h1>Operation: Trauma Shift</h1>
        <div class="row">
          <div class="label">Patient Health</div>
          <div class="meter"><div id="healthBar" class="bar"></div></div>
        </div>
        <div class="row">
          <div class="label">Symptoms Severity</div>
          <div class="meter"><div id="symptomBar" class="bar"></div></div>
        </div>
        <div class="row">
          <div class="label">Foreign Objects Remaining</div>
          <ul id="objectList"></ul>
        </div>
        <div id="status" class="status">Use your mouse like precision forceps. Click an object to remove it. Do not touch the cavity walls.</div>
        <button id="restartBtn">Restart Surgery</button>
        <div class="tip">If the tool touches the red wall, health drops and symptoms worsen.</div>
      </section>
      <section class="panel">
        <canvas id="board" width="960" height="600" aria-label="Surgery game board"></canvas>
      </section>
    </main>

    <script>
      const canvas = document.getElementById('board');
      const ctx = canvas.getContext('2d');
      const healthBar = document.getElementById('healthBar');
      const symptomBar = document.getElementById('symptomBar');
      const statusEl = document.getElementById('status');
      const objectListEl = document.getElementById('objectList');
      const restartBtn = document.getElementById('restartBtn');

      const body = { x: 120, y: 70, w: 720, h: 460, padding: 28 };

      const names = [
        'Shard of Glass',
        'Toy Spring',
        'Micro Screw',
        'Fish Hook',
        'Bent Nail',
        'Coin Fragment'
      ];

      let game;
      let pointer = { x: 0, y: 0, inside: false };

      function rand(min, max) {
        return Math.random() * (max - min) + min;
      }

      function initGame() {
        game = {
          health: 100,
          symptoms: 15,
          ended: false,
          won: false,
          objects: names.map((name, i) => ({
            id: i,
            name,
            x: rand(body.x + body.padding + 26, body.x + body.w - body.padding - 26),
            y: rand(body.y + body.padding + 26, body.y + body.h - body.padding - 26),
            r: rand(14, 24),
            rotation: rand(0, Math.PI * 2),
            removed: false
          })),
          hitCooldown: 0
        };
        pointer = { x: 0, y: 0, inside: false };
        setStatus('Scalpel in. Keep a steady hand and remove all foreign objects.');
        updateHud();
      }

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function updateHud() {
        healthBar.style.width = `${Math.max(0, game.health)}%`;
        symptomBar.style.width = `${Math.min(100, game.symptoms)}%`;

        const remaining = game.objects.filter(o => !o.removed);
        objectListEl.innerHTML = remaining.map(o => `<li>${o.name}</li>`).join('') || '<li>None</li>';
      }

      function inInnerCavity(x, y) {
        return (
          x > body.x + body.padding &&
          y > body.y + body.padding &&
          x < body.x + body.w - body.padding &&
          y < body.y + body.h - body.padding
        );
      }

      function inOuterBody(x, y) {
        return x > body.x && y > body.y && x < body.x + body.w && y < body.y + body.h;
      }

      function hurtPatient(reason) {
        if (game.ended) return;
        game.health -= 7;
        game.symptoms += 10;
        setStatus(`Contact with cavity wall! ${reason} Health dropping, symptoms escalating.`);

        if (game.health <= 0) {
          game.health = 0;
          game.ended = true;
          game.won = false;
          setStatus('Patient died. Malpractice suit filed, license revoked, job lost, and your life collapses into survival in an abandoned Circuit City.');
        }
        updateHud();
      }

      function removeObjectAt(x, y) {
        if (game.ended) return;

        let hit = false;
        for (const obj of game.objects) {
          if (obj.removed) continue;
          const dx = x - obj.x;
          const dy = y - obj.y;
          if (Math.hypot(dx, dy) <= obj.r + 8) {
            obj.removed = true;
            hit = true;
            game.symptoms = Math.max(0, game.symptoms - 12);
            game.health = Math.min(100, game.health + 4);
            setStatus(`Removed: ${obj.name}. Patient stabilizing.`);
            break;
          }
        }

        if (!hit) {
          setStatus('Missed object. Reposition carefully.');
        }

        const remaining = game.objects.some(o => !o.removed);
        if (!remaining) {
          game.ended = true;
          game.won = true;
          setStatus('Surgery complete! Every object removed. You are celebrated as the best surgeon and showered with awards and public praise.');
        }

        updateHud();
      }

      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * canvas.width;
        pointer.y = ((e.clientY - rect.top) / rect.height) * canvas.height;
        pointer.inside = inOuterBody(pointer.x, pointer.y);
      });

      canvas.addEventListener('mouseleave', () => {
        pointer.inside = false;
      });

      canvas.addEventListener('click', () => {
        if (game.ended) return;

        if (pointer.inside && !inInnerCavity(pointer.x, pointer.y)) {
          hurtPatient('You scraped tissue while attempting extraction.');
          return;
        }

        if (inInnerCavity(pointer.x, pointer.y)) {
          removeObjectAt(pointer.x, pointer.y);
        }
      });

      restartBtn.addEventListener('click', initGame);

      function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Backdrop grid
        ctx.fillStyle = '#0d1424';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        for (let x = 0; x < canvas.width; x += 30) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, canvas.height);
          ctx.stroke();
        }

        // Body area
        ctx.fillStyle = '#ffd7c2';
        ctx.fillRect(body.x, body.y, body.w, body.h);

        // Dangerous edge
        ctx.strokeStyle = '#ff4d4d';
        ctx.lineWidth = body.padding * 2;
        ctx.strokeRect(body.x + body.padding / 2, body.y + body.padding / 2, body.w - body.padding, body.h - body.padding);

        // Safe cavity
        ctx.fillStyle = '#7d2a2a';
        ctx.fillRect(body.x + body.padding, body.y + body.padding, body.w - body.padding * 2, body.h - body.padding * 2);

        // Objects
        for (const obj of game.objects) {
          if (obj.removed) continue;
          ctx.save();
          ctx.translate(obj.x, obj.y);
          ctx.rotate(obj.rotation);
          ctx.fillStyle = '#d7ecff';
          ctx.strokeStyle = '#325a84';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.roundRect(-obj.r, -obj.r * 0.4, obj.r * 2, obj.r * 0.8, 5);
          ctx.fill();
          ctx.stroke();
          ctx.restore();
        }

        // Pointer tool
        if (pointer.inside && !game.ended) {
          const risky = !inInnerCavity(pointer.x, pointer.y);
          ctx.strokeStyle = risky ? '#ff8080' : '#8df7ad';
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(pointer.x, pointer.y, 11, 0, Math.PI * 2);
          ctx.stroke();

          if (risky) {
            if (game.hitCooldown <= 0) {
              hurtPatient('Continuous pressure on the cavity wall detected.');
              game.hitCooldown = 12;
            }
          }
        }

        if (game.hitCooldown > 0) game.hitCooldown -= 1;

        if (game.ended) {
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#fff';
          ctx.textAlign = 'center';
          ctx.font = '700 46px system-ui';
          ctx.fillText(game.won ? 'SUCCESS' : 'MALPRACTICE', canvas.width / 2, canvas.height / 2 - 10);
          ctx.font = '400 22px system-ui';
          ctx.fillText(game.won ? 'All foreign objects removed.' : 'Patient lost. Career over.', canvas.width / 2, canvas.height / 2 + 30);
        }
      }

      function loop() {
        drawBoard();
        requestAnimationFrame(loop);
      }

      initGame();
      loop();
    </script>
  </body>
</html>
