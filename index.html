<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathogen Dominion</title>
  <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>
  <div id="app" class="game-shell">
    <header class="top-bar panel">
      <div>
        <h1>Pathogen Dominion</h1>
        <p class="subtitle">Turn-based host conquest strategy</p>
      </div>
      <div class="top-buttons">
        <button id="btn-new-game">New Run</button>
        <button id="btn-save">Save</button>
        <button id="btn-load">Load</button>
        <button id="btn-export">Export</button>
        <label class="import-label">Import <input id="import-file" type="file" accept="application/json" /></label>
        <button id="btn-settings">Settings</button>
      </div>
    </header>

    <main class="main-layout">
      <section class="map-column panel">
        <div class="panel-header">
          <h2>Host Atlas</h2>
          <button id="btn-end-turn" class="accent">End Turn</button>
        </div>
        <canvas id="map-canvas" width="640" height="448" aria-label="Body map"></canvas>
        <p class="hint">Click a region to inspect and issue spread actions.</p>
      </section>

      <section class="right-column">
        <article class="panel" id="host-status-panel"></article>
        <article class="panel" id="pathogen-panel"></article>
        <article class="panel" id="region-panel"></article>
        <article class="panel" id="actions-panel"></article>
      </section>
    </main>

    <section class="bottom-layout">
      <article class="panel log-panel">
        <div class="panel-header"><h3>Turn Log</h3></div>
        <div id="log-feed"></div>
      </article>
      <article class="panel research-panel">
        <div class="panel-header"><h3>Adaptation Tree</h3></div>
        <div id="research-list"></div>
      </article>
      <article class="panel codex-panel">
        <div class="panel-header">
          <h3>Codex</h3>
          <select id="codex-topic"></select>
        </div>
        <div id="codex-content"></div>
      </article>
    </section>
  </div>

  <div id="menu-modal" class="modal open">
    <div class="modal-card panel">
      <h2>Select Pathogen Archetype</h2>
      <p>Choose a biologically distinct faction and begin from its preferred entry niche.</p>
      <div id="faction-options" class="faction-grid"></div>
      <button id="btn-start-game" class="accent" disabled>Start Infection</button>
    </div>
  </div>

  <div id="settings-modal" class="modal">
    <div class="modal-card panel">
      <h2>Settings</h2>
      <label>Difficulty
        <select id="difficulty-select">
          <option value="standard">Standard</option>
          <option value="harsh">Harsh Immunity</option>
          <option value="lenient">Lenient Host</option>
        </select>
      </label>
      <label><input type="checkbox" id="scanline-toggle" /> Scanline Overlay</label>
      <button id="btn-close-settings">Close</button>
    </div>
  </div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
